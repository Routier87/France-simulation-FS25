<!DOCTYPE html>
<html><head><title>Centrale</title></head>
<body>

<header style="background:#2e7d32;color:white;padding:15px;text-align:center;">
  <img src="France-simulation-FS25.png" style="height:60px;"><br>
  <h1>France Simulation - FS25</h1>
</header>

<nav style="background:#ddd;padding:10px;text-align:center;">
<a href="index.html">Accueil</a> |
<a href="devis.html">Devis</a> |
<a href="facture.html">Facture</a> |
<a href="centrale.html">Centrale Agricole</a>
</nav>

<div style="padding:20px;">
<h2>Centrale Agricole</h2>

<div id="login">
<input id="user" placeholder="Utilisateur"><br><br>
<input id="pass" type="password" placeholder="Mot de passe"><br><br>
<button onclick="login()">Connexion</button>
<p id="err" style="color:red;"></p>
</div>

<div id="admin" style="display:none;">
<h3>Ajouter matériel</h3>
<input id="nom" placeholder="Nom"><br>
<input id="prix" placeholder="Prix"><br>
<input id="img" placeholder="Image URL"><br>
<button onclick="add()">Ajouter</button>
</div>

<div id="list"></div>

<script>
let items=[];

function login(){
 if(user.value==="Centrale agricole" && pass.value==="FranceSimulation"){
  login.style.display="none";
  admin.style.display="block";
 } else {
  err.innerText="Erreur";
 }
}

function add(){
 items.push({nom:nom.value,prix:prix.value,img:img.value});
 render();
}

function render(){
 let html="";
 items.forEach(i=>{
 html+=`<div style="border:1px solid #ccc;margin:10px;padding:10px;">
 <h3>${i.nom}</h3>
 <img src="${i.img}" width="200"><br>
 <p>${i.prix} €</p>
 </div>`;
 });
 list.innerHTML=html;
}
</script>

</div>
</body></html>
