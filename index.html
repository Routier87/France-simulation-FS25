<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>FS25 Gestion</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#2e7d32; color:white; padding:15px; text-align:center; }
    nav { display:flex; gap:10px; padding:10px; background:#ddd; }
    nav button { padding:10px; cursor:pointer; }
    .page { display:none; padding:20px; }
    .active { display:block; }
    .card { background:white; padding:15px; border-radius:10px; margin:10px 0; }
    img { max-width:100%; border-radius:10px; }
  </style>
</head>
<body>

<header>
  <h1>France Simulation - FS25 Gestion</h1>
</header>

<nav>
  <button onclick="showPage('accueil')">Accueil</button>
  <button onclick="showPage('devis')">Devis</button>
  <button onclick="showPage('facture')">Facture</button>
  <button onclick="showPage('centrale')">Centrale Agricole</button>
</nav>

<div id="accueil" class="page active">
  <h2>Accueil</h2>
  <p>Bienvenue sur ton site FS25</p>
</div>

<div id="devis" class="page">
  <h2>Devis</h2>
  <p>Création de devis</p>
</div>

<div id="facture" class="page">
  <h2>Facture</h2>
  <p>Création de facture</p>
</div>

<div id="centrale" class="page">
  <h2>LA CENTRALE AGRICOLE</h2>

  <div id="login">
    <h3>Connexion admin</h3>
    <input id="user" placeholder="Utilisateur"><br><br>
    <input id="pass" type="password" placeholder="Mot de passe"><br><br>
    <button onclick="login()">Se connecter</button>
    <p id="error" style="color:red;"></p>
  </div>

  <div id="admin" style="display:none;">
    <h3>Ajouter matériel</h3>
    <input id="nom" placeholder="Nom"><br><br>
    <input id="prix" placeholder="Prix"><br><br>
    <input id="image" placeholder="URL image"><br><br>
    <button onclick="addItem()">Ajouter</button>
  </div>

  <div id="catalogue"></div>
</div>

<script>
let isAdmin = false;
let catalogue = [];

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function login(){
  let u=document.getElementById('user').value;
  let p=document.getElementById('pass').value;

  if(u==="Centrale agricole" && p==="FranceSimulation"){
    isAdmin=true;
    document.getElementById('login').style.display="none";
    document.getElementById('admin').style.display="block";
  } else {
    document.getElementById('error').innerText="Erreur";
  }
}

function addItem(){
  let nom=document.getElementById('nom').value;
  let prix=document.getElementById('prix').value;
  let image=document.getElementById('image').value;

  catalogue.push({nom, prix, image});
  render();
}

function render(){
  let html="";
  catalogue.forEach((item,i)=>{
    html+=`
    <div class="card">
      <h3>${item.nom}</h3>
      <img src="${item.image}">
      <p>Prix: ${item.prix} €</p>
    </div>`;
  });
  document.getElementById('catalogue').innerHTML=html;
}
</script>

</body>
</html>
